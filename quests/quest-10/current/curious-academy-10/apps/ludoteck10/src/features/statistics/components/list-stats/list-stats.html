@let statistics = stats$ | async;

<H2>{{title$ | async}}</H2>

<table>
    <tr>
        <td>annee</td>
        <td>nb succes</td>
        <td>nb echec</td>
    </tr>
    @for (stat of statistics; track stat) {
    <tr>
        <td>{{stat.year}}</td>
        <td>{{stat.nbSucces}}</td>
        <td>{{stat.nbFailaures}}</td>
    </tr>
    }
</table>
